name: Publish to PyPI

on:
  workflow_call:
    inputs:
      version:
        type: string
        description: 'Release version'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Publish
        run: uv publish -t "${{ secrets.PYPI_TOKEN }}"
